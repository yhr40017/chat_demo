<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="42%" cy="36%" r="65%">
      <stop offset="0%" stop-color="#CADAD2"/>
      <stop offset="100%" stop-color="#5A8878"/>
    </radialGradient>
    <radialGradient id="shine" cx="40%" cy="28%" r="45%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="47" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="47" fill="url(#shine)"/>
  <!-- Sun center -->
  <circle cx="50" cy="50" r="14" fill="#FFFFFF" opacity="0.9"/>
  <!-- 8 rays (rounded rects rotated around center) -->
  <rect x="48.75" y="24" width="2.5" height="9" rx="1.25" fill="#FFFFFF" opacity="0.9" transform="rotate(0   50 50)"/>
  <rect x="48.75" y="24" width="2.5" height="9" rx="1.25" fill="#FFFFFF" opacity="0.9" transform="rotate(45  50 50)"/>
  <rect x="48.75" y="24" width="2.5" height="9" rx="1.25" fill="#FFFFFF" opacity="0.9" transform="rotate(90  50 50)"/>
  <rect x="48.75" y="24" width="2.5" height="9" rx="1.25" fill="#FFFFFF" opacity="0.9" transform="rotate(135 50 50)"/>
  <rect x="48.75" y="24" width="2.5" height="9" rx="1.25" fill="#FFFFFF" opacity="0.9" transform="rotate(180 50 50)"/>
  <rect x="48.75" y="24" width="2.5" height="9" rx="1.25" fill="#FFFFFF" opacity="0.9" transform="rotate(225 50 50)"/>
  <rect x="48.75" y="24" width="2.5" height="9" rx="1.25" fill="#FFFFFF" opacity="0.9" transform="rotate(270 50 50)"/>
  <rect x="48.75" y="24" width="2.5" height="9" rx="1.25" fill="#FFFFFF" opacity="0.9" transform="rotate(315 50 50)"/>
</svg>
