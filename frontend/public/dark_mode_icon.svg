<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="42%" cy="36%" r="65%">
      <stop offset="0%" stop-color="#CADAD2"/>
      <stop offset="100%" stop-color="#5A8878"/>
    </radialGradient>
    <radialGradient id="shine" cx="40%" cy="28%" r="45%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Mask creates crescent: outer circle minus offset inner circle -->
    <mask id="moon_mask">
      <rect width="100" height="100" fill="white"/>
      <circle cx="57" cy="44" r="16" fill="black"/>
    </mask>
  </defs>
  <circle cx="50" cy="50" r="47" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="47" fill="url(#shine)"/>
  <!-- Crescent moon -->
  <circle cx="50" cy="50" r="19" fill="#FFFFFF" opacity="0.9" mask="url(#moon_mask)"/>
  <!-- Stars -->
  <circle cx="68" cy="26" r="2"   fill="#FFFFFF" opacity="0.70"/>
  <circle cx="74" cy="42" r="1.5" fill="#FFFFFF" opacity="0.60"/>
  <circle cx="62" cy="18" r="1.2" fill="#FFFFFF" opacity="0.55"/>
</svg>
